<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>P-LSRS</title>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    textarea { width: 100%; height: 80px; }
    input[type="number"] { width: 80px; }
    .row { margin-bottom: 12px; }
  </style>
</head>
<body>
  <h2>文字エンコード / デコード</h2>

  <div class="row">
    <label>キー（0〜255）:
      <input id="key" type="number" min="0" max="255" value="23">
    </label>
  </div>

  <div class="row">
    <label>元のテキスト：</label><br>
    <textarea id="plain"></textarea>
  </div>

  <div class="row">
    <button onclick="onEncode()">エンコード →</button>
    <button onclick="onDecode()">← デコード</button>
  </div>

  <div class="row">
    <label>エンコード結果（半角英数字）：</label><br>
    <textarea id="encoded"></textarea>
  </div>

  <script>
    // アルファベット優先の Base62
    const BASE62 = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

    function base62Index(c) {
      const code = c.charCodeAt(0);
      if (code >= 0x41 && code <= 0x5A) return code - 0x41;          // A-Z (0-25)
      if (code >= 0x61 && code <= 0x7A) return code - 0x61 + 26;     // a-z (26-51)
      if (code >= 0x30 && code <= 0x39) return code - 0x30 + 52;     // 0-9 (52-61)
      return 0;
    }

    function encodeGarble(str, key) {
      const encoder = new TextEncoder();          // UTF-8
      const bytes = encoder.encode(str);
      let out = "";

      for (let i = 0; i < bytes.length; i++) {
        const x = bytes[i] ^ key;                // XOR

        const hi = Math.floor(x / 62);
        const lo = x % 62;

        out += BASE62[hi] + BASE62[lo];
      }
      return out;
    }

    function decodeGarble(encoded, key) {
      const bytes = [];
      const clean = encoded.replace(/[^A-Za-z0-9]/g, ""); // 念のため英数字以外除去

      for (let i = 0; i < clean.length; i += 2) {
        const hi = base62Index(clean[i]);
        const lo = base62Index(clean[i + 1]);
        const x = hi * 62 + lo;
        bytes.push(x ^ key);
      }

      const decoder = new TextDecoder();         // UTF-8
      return decoder.decode(new Uint8Array(bytes));
    }

    function onEncode() {
      const key = Number(document.getElementById("key").value) & 0xFF;
      const plain = document.getElementById("plain").value;
      document.getElementById("encoded").value = encodeGarble(plain, key);
    }

    function onDecode() {
      const key = Number(document.getElementById("key").value) & 0xFF;
      const encoded = document.getElementById("encoded").value.trim();
      document.getElementById("plain").value = decodeGarble(encoded, key);
    }
  </script>
</body>
</html>
