<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>P-LSRS</title>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    textarea { width: 100%; height: 80px; }
    input[type="number"] { width: 80px; }
    .row { margin-bottom: 12px; }
  </style>
</head>
<body>
  <h2>エニグマ（Enigma M3）</h2>

  <div class="row">
    <label>キー（0〜255）:
      <input id="key" type="number" min="0" max="255" value="23">
    </label>
  </div>

  <div class="row">
    <label>元のテキスト：</label><br>
    <textarea id="plain"></textarea>
  </div>

  <div class="row">
    <button onclick="onEncode()">エンコード →</button>
    <button onclick="onDecode()">← デコード</button>
  </div>

  <div class="row">
    <label>エンコード結果（半角英字）：</label><br>
    <textarea id="encoded"></textarea>
  </div>

<script>
// ===============================
//   エニグマ（Enigma M3）
// ===============================

const A = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

const ROTORS = {
  I:   { wiring: "EKMFLGDQVZNTOWYHXUSPAIBRCJ", notch: "Q" },
  II:  { wiring: "AJDKSIRUXBLHWTMCQGZNPYFVOE", notch: "E" },
  III: { wiring: "BDFHJLCPRTXVZNYEIWGAKMUSQO", notch: "V" }
};

const REFLECTORS = {
  B: "YRUHQSLDPXNGOKMIEBFZCWVJAT"
};

function makePlugboard(pairs) {
  let map = {};
  for (let c of A) map[c] = c;
  for (let [a, b] of pairs) {
    map[a] = b;
    map[b] = a;
  }
  return map;
}

class Rotor {
  constructor(wiring, notch, ring, pos) {
    this.wiring = wiring;
    this.notch = notch;
    this.ring = ring;
    this.pos = pos;
    this.inverse = this.makeInverse(wiring);
  }
  makeInverse(w) {
    let inv = Array(26);
    for (let i = 0; i < 26; i++) {
      inv[w.charCodeAt(i) - 65] = A[i];
    }
    return inv.join("");
  }
  step() { this.pos = (this.pos + 1) % 26; }
  atNotch() { return A[this.pos] === this.notch; }
  forward(c) {
    let idx = (c.charCodeAt(0) - 65 + this.pos - this.ring + 26) % 26;
    let out = this.wiring[idx];
    let outIdx = (out.charCodeAt(0) - 65 - this.pos + this.ring + 26) % 26;
    return A[outIdx];
  }
  backward(c) {
    let idx = (c.charCodeAt(0) - 65 + this.pos - this.ring + 26) % 26;
    let out = this.inverse[idx];
    let outIdx = (out.charCodeAt(0) - 65 - this.pos + this.ring + 26) % 26;
    return A[outIdx];
  }
}

class Enigma {
  constructor(rotorNames, ringSettings, positions, reflectorName, plugPairs) {
    this.plug = makePlugboard(plugPairs);
    this.rotors = [
      new Rotor(ROTORS[rotorNames[0]].wiring, ROTORS[rotorNames[0]].notch, ringSettings[0], positions[0]),
      new Rotor(ROTORS[rotorNames[1]].wiring, ROTORS[rotorNames[1]].notch, ringSettings[1], positions[1]),
      new Rotor(ROTORS[rotorNames[2]].wiring, ROTORS[rotorNames[2]].notch, ringSettings[2], positions[2])
    ];
    this.reflector = REFLECTORS[reflectorName];
  }

  stepRotors() {
    if (this.rotors[1].atNotch()) {
      this.rotors[1].step();
      this.rotors[2].step();
    }
    if (this.rotors[0].atNotch()) {
      this.rotors[1].step();
    }
    this.rotors[0].step();
  }

  encryptChar(c) {
    if (!A.includes(c)) return c;

    this.stepRotors();

    c = this.plug[c];

    for (let r of this.rotors) c = r.forward(c);

    c = this.reflector[c.charCodeAt(0) - 65];

    for (let i = 2; i >= 0; i--) c = this.rotors[i].backward(c);

    c = this.plug[c];

    return c;
  }

  encrypt(str) {
    let out = "";
    for (let c of str.toUpperCase()) {
      if (A.includes(c)) out += this.encryptChar(c);
    }
    return out;
  }
}

// ===============================
//  UI 接続（A〜Z専用）
// ===============================

function onEncode() {
  const key = Number(document.getElementById("key").value) & 0xFF;
  const plain = document.getElementById("plain").value.toUpperCase().replace(/[^A-Z]/g, "");

  const enigma = new Enigma(
    ["I", "II", "III"],
    [0, 0, 0],
    [key % 26, (key+1)%26, (key+2)%26],
    "B",
    [["A","G"], ["E","T"]]
  );

  const encrypted = enigma.encrypt(plain);
  document.getElementById("encoded").value = encrypted;
}

function onDecode() {
  const key = Number(document.getElementById("key").value) & 0xFF;
  const encoded = document.getElementById("encoded").value.trim().toUpperCase().replace(/[^A-Z]/g, "");

  const enigma = new Enigma(
    ["I", "II", "III"],
    [0, 0, 0],
    [key % 26, (key+1)%26, (key+2)%26],
    "B",
    [["A","G"], ["E","T"]]
  );

  const decrypted = enigma.encrypt(encoded);
  document.getElementById("plain").value = decrypted;
}
</script>


</body>
</html>
